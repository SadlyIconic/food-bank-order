{% extends "base.html" %}

{% block title %}{% if is_edit %}Edit{% else %}New{% endif %} Entry — Tennis Journal{% endblock %}

{% block content %}
<section class="page-header">
  <h1>{% if is_edit %}Edit entry{% else %}New entry{% endif %}</h1>
</section>

<form class="entry-form" method="post"
      action="{% if is_edit %}{{ url_for('edit_entry', entry_id=entry.id) }}{% else %}{{ url_for('create_entry') }}{% endif %}">
  <div class="form-group">
    <label for="opponent">Opponent</label>
    <input type="text" id="opponent" name="opponent" required
           value="{{ entry.opponent if entry else '' }}">
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" name="date" required
             value="{{ entry.date if entry else '' }}">
    </div>
    <div class="form-group">
      <label for="result">Result</label>
      <select id="result" name="result">
        <option value="" {% if not entry or not entry.result %}selected{% endif %}>—</option>
        <option value="win" {% if entry and entry.result == 'win' %}selected{% endif %}>Win</option>
        <option value="loss" {% if entry and entry.result == 'loss' %}selected{% endif %}>Loss</option>
      </select>
    </div>
    <div class="form-group">
      <label for="match_type">Match type</label>
      <select id="match_type" name="match_type">
        <option value="singles" {% if not entry or entry.match_type == 'singles' %}selected{% endif %}>Singles</option>
        <option value="doubles" {% if entry and entry.match_type == 'doubles' %}selected{% endif %}>Doubles</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="score">Score</label>
    <input type="text" id="score" name="score" required
           placeholder="e.g. 6-4, 6-3 (W)"
           value="{{ entry.score if entry else '' }}">
  </div>

  <div class="form-group">
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="6"
              placeholder="Opponent style, your play, takeaways…">{{ entry.notes if entry else '' }}</textarea>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="{{ url_for('index') }}" class="btn btn-muted">Cancel</a>
  </div>
</form>

{% if is_edit %}
  <form method="post" action="{{ url_for('delete_entry', entry_id=entry.id) }}" class="delete-form"
        onsubmit="return confirm('Delete this entry?');">
    <button type="submit" class="btn btn-danger">Delete entry</button>
  </form>
{% endif %}
{% endblock %}
