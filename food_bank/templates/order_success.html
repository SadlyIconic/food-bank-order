{% extends "base.html" %}

{% block title %}Order placed — Food Bank Order{% endblock %}

{% block content %}
<div class="empty-state success-state">
  <h1>Order placed!</h1>
  <p>Thank you. Your order has been submitted and added to the shopping list.</p>
  <a href="{{ url_for('shop') }}" class="btn btn-primary">Place another order</a>
</div>
{% endblock %}

{% block scripts %}
<script>
  document.addEventListener("DOMContentLoaded", () => {
    FoodBankCart.clearCart();
    FoodBankCart.updateBadge();
  });
</script>
{% endblock %}
