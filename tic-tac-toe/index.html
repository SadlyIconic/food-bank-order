<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Tic Tac Toe</h1>

    <div id="menuScreen" class="menu-screen">
      <p class="menu-subtitle">Choose a series length</p>
      <div class="menu-buttons">
        <button class="menu-btn" data-best-of="1">Best of 1</button>
        <button class="menu-btn" data-best-of="3">Best of 3</button>
        <button class="menu-btn" data-best-of="5">Best of 5</button>
      </div>
    </div>

    <div id="gameScreen" class="game-screen hidden">
      <p class="series-info" id="seriesInfo">Best of 3</p>

      <div class="scoreboard">
        <div class="score-item">
          <span class="score-label x-label">X Wins</span>
          <span class="score-value" id="scoreX">0</span>
        </div>
        <div class="score-item">
          <span class="score-label">Ties</span>
          <span class="score-value" id="scoreTies">0</span>
        </div>
        <div class="score-item">
          <span class="score-label o-label">O Wins</span>
          <span class="score-value" id="scoreO">0</span>
        </div>
      </div>

      <p class="status" id="status">Player X's turn</p>

      <div class="board" id="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      </div>

      <button class="reset-btn" id="resetBtn" disabled>Next Round</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
